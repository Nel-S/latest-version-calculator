<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="stylesheet" type="text/css" href="/style.css">
	<!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
	<link rel="icon" type="image/png" href="/blank.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Chronology Calculator</title>
	<meta property="og:title" content="Chronology Calculator">
	<meta property="og:description" content="Finds the latest Minecraft release and snapshot on a particular date.">
</head>

<body>

	<noscript>
		<div>
			<p>This page requires JavaScript to function.</p>
			<p>As an alternative, you can browse Omniarchive's indices for Java Edition (<a href="https://docs.google.com/spreadsheets/d/1OCxMNQLeZJi4BlKKwHx2OlzktKiLEwFXnmCrSdAFwYQ">1</a> and <a href="https://docs.google.com/spreadsheets/d/1YuDRk6zulCPTE5hRDJC797ORQeB27j_lpOM2Y6onb_g">2</a>), as well as the Minecraft Wiki's articles regarding the <a href="https://minecraft.wiki/w/Java_Edition_version_history">Java Edition version history</a>, <a href="https://minecraft.wiki/w/Bedrock_Edition_version_history">Bedrock Edition version history</a>, etc.</p>
		</div>
	</noscript>

	<div class="page">
		<div>
			<h1 class="title">Chronology Calculator</h1>
		</div>

		<ul class="input-box">
			<li class="narrow-rounded-box input-entry">
				<label class="label" for="list-form">List:</label>
				<select class="listener" id="list-form">
					<optgroup label="Minecraft Releases">
						<option>Java Edition</option>
						<option>Xbox 360 Edition</option>
					</optgroup>
					<optgroup label="Custom">
						<option>From URL</option>
						<option>From File Upload</option>
					</optgroup>
				</select>
				<input type="url" id="list-form-url" placeholder="URL..." pattern="^https?://.*" class="hidden">
				<!-- TODO: Figure out how to center -->
				<input type="file" id="list-form-file-upload" accept=".json,.JSON" class="hidden">
			</li>
			<li class="narrow-rounded-box input-entry">
				<label class="label" for="datetime-form">Date:</label>
				<input type="datetime-local" class="listener" id="datetime-form" onclick="this.showPicker()">
			</li>
			<li class="narrow-rounded-box input-entry input-utc-hires">
				<label class="label" for="utc-offset-form">UTC Offset:</label>
				<input type="range" min="-12" max="14" step="0.25" class="listener" id="utc-offset-form">
				<div class="subtext" id="current-utc-offset"></div>
			</li>
		</ul>

		<div class="rounded-box output-box" id="output-container">
			<div class="list-name">
				[Retrieving list...]
			</div>
		</div>

		<div>
			<p class="subtext" id="list-last-updated"></p>
		</div>
	</div>
	<div class="about smaller-label">
		<p>This tool uses harmonizations of multiple sources. It may contain errors; please file <a href="https://github.com/Nel-S/latest-version-calculator/issues">an Issue</a> if so.</p>
		<p>Thank you to <a href="https://github.com/Moresteck">Moresteck</a>, <a href="https://github.com/fanda857">fanda857</a>, and <a href="https://omniarchive.uk/">Omniarchive</a>'s/<a href="https://minecraft.wiki/">the Minecraft Wiki</a>'s contributors for making this possible.</p>
	</div>

	<script type="module" src="/src/main.ts"></script>
</body>

</html>
